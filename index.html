<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Pixelandia - Bienvenue</title>
<style>
  /* Reset */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  html, body {
    height: 100%;
    font-family: 'Orbitron', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow-x: hidden;
    transition: background 0.5s, color 0.5s;
  }

  /* MODE SOMBRE (plus intense posterisation) */
  @media (prefers-color-scheme: dark) {
    html, body {
      background:
        linear-gradient(135deg, #0d0f1a 0%, #120d2b 100%),
        repeating-linear-gradient(
          0deg,
          rgba(0, 255, 255, 0.25),
          rgba(0, 255, 255, 0.25) 8px,
          rgba(0, 0, 255, 0.20) 8px,
          rgba(0, 0, 255, 0.20) 16px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(0, 255, 255, 0.10),
          rgba(0, 255, 255, 0.10) 6px,
          rgba(0, 0, 255, 0.08) 6px,
          rgba(0, 0, 255, 0.08) 12px
        );
      color: #e0f7ff;
    }
    footer {
      background: rgba(0, 0, 0, 0.45);
      color: #8888ff;
      text-shadow: 0 0 8px #4444ff88;
      padding: 30px 0;
      height: auto;
      position: relative;
      z-index: 1;
    }
    /* Liseré bleu néon au-dessus du footer */
    footer::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #00f0ff, #0040ff, #00f0ff);
      box-shadow:
        0 0 8px #00f0ff,
        0 0 20px #00f0ff,
        0 0 30px #0040ff;
      z-index: 2;
      border-radius: 2px 2px 0 0;
    }
    main {
      display: flex;
      flex: 1;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }
    h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #00fff7;
      position: relative;
      user-select: none;
      text-shadow:
        0 0 5px #00fff7,
        0 0 10px #00fff7,
        0 0 20px #00fff7,
        0 0 40px #00fff7,
        0 0 80px #00fff7;
      animation: glitch-dark 2s infinite;
      padding: 0 1rem;
    }
    @keyframes glitch-dark {
      0% {
        text-shadow:
          2px 0 #00fff7,
          -2px 0 #d100ff,
          0 0 10px #00fff7;
        transform: translate(0, 0);
      }
      20% {
        text-shadow:
          2px 2px #00fff7,
          -2px -2px #d100ff,
          0 0 20px #00fff7;
        transform: translate(-1px, 1px);
      }
      40% {
        text-shadow:
          2px -2px #00fff7,
          -2px 2px #d100ff,
          0 0 30px #00fff7;
        transform: translate(1px, -1px);
      }
      60% {
        text-shadow:
          2px 0 #00fff7,
          -2px 0 #d100ff,
          0 0 10px #00fff7;
        transform: translate(0, 0);
      }
      80% {
        text-shadow:
          2px 2px #00fff7,
          -2px -2px #d100ff,
          0 0 20px #00fff7;
        transform: translate(-1px, 1px);
      }
      100% {
        text-shadow:
          2px -2px #00fff7,
          -2px 2px #d100ff,
          0 0 30px #00fff7;
        transform: translate(1px, -1px);
      }
    }
  }

  /* MODE CLAIR (plus intense posterisation) */
  @media (prefers-color-scheme: light) {
    html, body {
      background:
        linear-gradient(135deg, #e0f7ff 0%, #b0e0ff 100%),
        repeating-linear-gradient(
          0deg,
          rgba(0, 119, 255, 0.45),
          rgba(0, 119, 255, 0.45) 10px,
          rgba(0, 191, 255, 0.35) 10px,
          rgba(0, 191, 255, 0.35) 20px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(0, 119, 255, 0.20),
          rgba(0, 119, 255, 0.20) 8px,
          rgba(0, 191, 255, 0.15) 8px,
          rgba(0, 191, 255, 0.15) 16px
        );
      color: #0a1f44;
    }
    footer {
      background: rgba(200, 230, 255, 0.85);
      color: #1a3d7c;
      text-shadow: none;
      padding: 15px 0;
      height: auto;
      position: relative;
      z-index: 1;
    }
    /* Liseré bleu néon au-dessus du footer */
    footer::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #0077ff, #00bfff, #0077ff);
      box-shadow:
        0 0 6px #0077ff,
        0 0 15px #00bfff,
        0 0 25px #0077ff;
      z-index: 2;
      border-radius: 2px 2px 0 0;
    }
    main {
      display: flex;
      flex: 1;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1rem;
    }
    h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #004e92;
      position: relative;
      user-select: none;
      text-shadow:
        0 0 5px #4a90e2,
        0 0 10px #4a90e2,
        0 0 20px #4a90e2;
      animation: glitch-light 2s infinite;
      padding: 0 1rem;
    }
    @keyframes glitch-light {
      0% {
        text-shadow:
          2px 0 #4a90e2,
          -2px 0 #50e3c2,
          0 0 10px #4a90e2;
        transform: translate(0, 0);
      }
      20% {
        text-shadow:
          2px 2px #4a90e2,
          -2px -2px #50e3c2,
          0 0 20px #4a90e2;
        transform: translate(-1px, 1px);
      }
      40% {
        text-shadow:
          2px -2px #4a90e2,
          -2px 2px #50e3c2,
          0 0 30px #4a90e2;
        transform: translate(1px, -1px);
      }
