<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Pixelandia - Bienvenue</title>
<style>
  /* Reset */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: #0f0f1a;
    color: #eee;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: start;
    padding-top: 10vh;
    text-align: center;
  }

  h1 {
    font-size: 3.5rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #6a00ff, #00ffc3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    user-select: none;
  }

  footer {
    height: 40px;
    background: rgba(20, 20, 30, 0.8);
    color: #aaa;
    font-size: 0.9rem;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    position: sticky;
    bottom: 0;
    width: 100%;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  /* Responsive */
  @media (max-width: 600px) {
    h1 {
      font-size: 2.5rem;
      padding: 0 1rem;
    }
  }
</style>
</head>
<body>

<main>
  <h1>Bienvenue sur Pixelandia</h1>
</main>

<footer>
  © 2025 Pixelandia - Tous droits réservés
</footer>

</body>
</html>
