<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Bienvenue sur Pixelandia</title>
<style>
  /* Reset */
  * {
    box-sizing: border-box;
  }
  html, body {
    margin: 0; padding: 0;
    height: 100dvh;
    overflow: hidden;
    background: linear-gradient(135deg, #0a0a14 0%, #1a1a34 100%);
    color: #66d9ff;
    font-family: 'Courier New', Courier, monospace;
  }
  body {
    /* safe area pour mobiles */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);

    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    width: 100vw;
    height: 100vh;
    max-width: 100%;
    max-height: 100%;
    background: rgba(20, 20, 40, 0.85);
    border-radius: 0; /* plus arrondi, full écran */
    box-shadow:
      0 0 20px #66d9ffcc,
      inset 0 0 50px #112244dd;
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: auto;
  }
  h1 {
    font-size: 3.5rem;
    margin: 0 0 20px 0;
    color: #77ccff;
    text-shadow: 0 0 10px #66d9ff;
    letter-spacing: 0.1em;
  }
  p {
    font-size: 1.4rem;
    line-height: 1.6;
    max-width: 600px;
    color: #a0e0ffcc;
    text-shadow: 0 0 6px #5588ccaa;
    margin-bottom: 30px;
  }
  footer {
    font-size: 1rem;
    color: #555a8b;
    text-shadow: 0 0 5px #000a;
  }
  /* Scrollbar discret */
  .container::-webkit-scrollbar {
    width: 8px;
  }
  .container::-webkit-scrollbar-thumb {
    background: #66d9ff88;
    border-radius: 4px;
  }
  /* Responsive petits écrans */
  @media (max-width: 400px) {
    h1 {
      font-size: 2.8rem;
    }
    p {
      font-size: 1.1rem;
      padding: 0 10px;
    }
  }
</style>
</head>
<body>
  <div class="container" role="main">
    <h1>Bienvenue sur Pixelandia</h1>
    <p>Explorez l’univers numérique futuriste de Pixelandia. Votre portail vers l’innovation et la créativité en 2025.</p>
    <footer>© 2025 Pixelandia. Tous droits réservés.</footer>
  </div>
</body>
</html>
