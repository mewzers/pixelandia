<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pixelandia - Bienvenue</title>
  <style>
    /* Reset & base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    html, body {
      margin: 0; padding: 0;
      height: 100dvh;
      overflow-x: hidden; /* Supprime scroll horizontal */
      overflow-y: hidden;
      background: linear-gradient(135deg, #0a0a14 0%, #1a1a34 100%);
      color: #66d9ff;
      font-family: 'Courier New', Courier, monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Conteneur principal */
    .container {
      flex: 1;
      width: 100%;
      background: rgba(20, 20, 40, 0.85);
      box-shadow:
        0 0 20px #66d9ffcc,
        inset 0 0 50px #112244dd;
      padding: 60px 30px 30px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: auto;
    }

    /* Titre centré un peu sous le haut */
    h1 {
      margin: 0 0 20px 0;
      font-size: 3.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 10px #66d9ffbb;
    }
    h2 {
      font-size: 1.4rem;
      font-weight: 400;
      margin: 0 0 50px 0;
      color: #99dfffcc;
      letter-spacing: 0.1em;
    }

    /* Footer fixé en bas */
    footer {
      background: rgba(10, 10, 20, 0.9);
      color: #5599ccaa;
      text-align: center;
      font-size: 0.9rem;
      padding: 15px 10px;
      box-shadow: inset 0 1px 3px #223355aa;
      user-select: none;
      font-style: italic;
    }

    /* Responsive - adapter les textes */
    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
        letter-spacing: 0.1em;
      }
      h2 {
        font-size: 1rem;
        margin-bottom: 30px;
      }
      .container {
        padding: 50px 20px 20px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pixelandia</h1>
    <h2>Bienvenue en 2025</h2>
  </div>
  <footer>
    © 2025 Pixelandia - Tous droits réservés
  </footer>
</body>
</html>
