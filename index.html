<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Bienvenue sur Pixelandia</title>
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100vh;
    overflow: hidden;
    background: #0a0a14;
    color: #a0d8ff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .box {
    max-width: 450px;
    width: 90%;
    max-height: 90vh;
    background: #121224;
    border-radius: 12px;
    padding: 30px 20px;
    box-shadow: 0 0 15px #00aaff88;
    overflow: auto; /* si contenu dépasse (rare ici), scroll interne */
  }
  h1 {
    font-size: 2.4rem;
    margin-bottom: 15px;
    color: #00c8ff;
  }
  p {
    font-size: 1.1rem;
    line-height: 1.5;
    margin-bottom: 25px;
    color: #c0e8ff;
  }
  footer {
    font-size: 0.8rem;
    color: #555a8b;
  }
  @media (max-width: 400px) {
    h1 {
      font-size: 1.8rem;
    }
    p {
      font-size: 1rem;
    }
  }
</style>
</head>
<body>
  <div class="box">
    <h1>Bienvenue sur Pixelandia</h1>
    <p>Explorez l’univers numérique futuriste de Pixelandia. Votre portail vers l’innovation et la créativité en 2025.</p>
    <footer>© 2025 Pixelandia. Tous droits réservés.</footer>
  </div>
</body>
</html>
