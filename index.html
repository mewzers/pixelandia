<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bienvenue sur Pixelandia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

  /* Reset */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0d0d0d, #121212);
    color: #00ffea;
    font-family: 'Orbitron', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    font-size: 4rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-shadow:
      0 0 8px #00ffea,
      0 0 20px #00ffd8,
      0 0 40px #00ffe0,
      0 0 80px #00fff7;
    animation: flicker 3s infinite;
  }

  p {
    margin-top: 1.5rem;
    font-size: 1.5rem;
    color: #66fff3cc;
    max-width: 600px;
    line-height: 1.4;
  }

  /* Neon flicker animation */
  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
      opacity: 1;
      text-shadow:
        0 0 8px #00ffea,
        0 0 20px #00ffd8,
        0 0 40px #00ffe0,
        0 0 80px #00fff7;
    }
    20%, 22%, 24%, 55% {
      opacity: 0.8;
      text-shadow: none;
    }
  }

  /* Subtle background animation */
  body::before {
    content: '';
    position: absolute;
    top: -20%;
    left: -20%;
    width: 140%;
    height: 140%;
    background: radial-gradient(circle at center, #00fff7aa 0%, transparent 70%);
    animation: pulse 6s ease-in-out infinite;
    filter: blur(100px);
    z-index: -1;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }

</style>
</head>
<body>
  <h1>Bienvenue</h1>
  <p>Bienvenue sur <strong>Pixelandia</strong> — l'avenir du web, aujourd'hui. Explorez un univers numérique où la technologie rencontre l'esthétique futuriste.</p>
</body>
</html>
